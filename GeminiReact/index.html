<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Real Casa App</title>\n    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">\n    <script src="https://cdn.jsdelivr.net/npm/react/umd/react.development.js" crossorigin></script>\n    <script src="https://cdn.jsdelivr.net/npm/react-dom/umd/react-dom.development.js" crossorigin></script>\n    <script src="https://cdn.jsdelivr.net/npm/framer-motion/dist/framer-motion.umd.js"></script>\n</head>\n<body class="bg-gray-100">\n    <div id="root"></div>\n    <script>\n        const { motion } = window['framer-motion'];\n        const { useState } = React;\n        const mockData = [\n            { id: 1, name: 'Component 1', description: 'Description of Component 1' },\n            { id: 2, name: 'Component 2', description: 'Description of Component 2' },\n            { id: 3, name: 'Component 3', description: 'Description of Component 3' }\n        ];\n        function Dashboard() {\n            return (\n                <div className="p-4">\n                    <h1 className="text-2xl font-bold mb-4">Real Casa Dashboard</h1>\n                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">\n                        {mockData.map(item => (\n                            <motion.div key={item.id} className="bg-white rounded-lg shadow p-4" initial={{ scale: 0 }} animate={{ scale: 1 }} exit={{ scale: 0 }}>\n                                <h2 className="font-semibold">{item.name}</h2>\n                                <p>{item.description}</p>\n                            </motion.div>\n                        ))}\n                    </div>\n                </div>\n            );\n        }\n        ReactDOM.render(<Dashboard />, document.getElementById('root'));\n    </script>\n</body>\n</html>
